<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYNAMIC WEBSITE BUILDER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            margin: 10px;
            background-color: black;
        }

        .container {
            margin: auto;
            margin-block: 5px;
            background-color: #0f0f0f;
            color: white;
            border-radius: 20px;
            width: 950px;
            /* border: 2px solid rgb(207, 183, 183); */
            overflow: hidden;
        }

        .card {
            display: flex;
            width: 100%;
            align-items: center;
            gap: 5px;
            padding: 10px;

        }

        .img {
            padding: 2px;
            display: flex;
            justify-content: center; 
            align-items: center;
            /* Center vertically */
            width: 220px;
            /* Ensure this width is slightly larger than the image width */

            position: relative;
        }

        .img img {
            width: 200px;
            border-radius: 20px;
            overflow: hidden;
        }

        .text h1,
        p {
            padding: 5px 1px;
            /* margin: 0; */
        }
        .img .capsule{
            position: absolute;
            z-index: 10;
            color: white;
            bottom: 8px;
            right: 20px;
            background-color: rgba(27, 21, 21, 0.589) ;
            padding: 3px;
            border-radius: 5px;
        }
        img:hover{
            cursor: pointer;
        }
        ::selection{
            background-color: rgba(128, 128, 128, 0.452);
        }
    </style>
</head>

<body>
    <div class="container">
        
    </div>
    <div class="container">
        
    </div>
    <div class="container">
        
    </div>
    <div class="container">
        
    </div>
    <div class="container">
        
    </div>
    <div class="container">
        
    </div>


    <script src="script.js"></script>
</body>

</html>
